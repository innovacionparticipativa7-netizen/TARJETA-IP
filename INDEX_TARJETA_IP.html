<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Innovación Participativa | Nueva Idea</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0d0d0d;
  color:#fff;
}

header{
  background:#2b2b2b;
  padding:18px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #444;
}

.logo{
  font-size:22px;
  font-weight:bold;
  letter-spacing:1px;
}

.logo span{
  color:#ffe95c;
}

nav button{
  background:#ffe95c;
  color:#111;
  border:none;
  border-radius:20px;
  padding:10px 18px;
  cursor:pointer;
  font-weight:bold;
}

.container{
  max-width:1150px;
  margin:35px auto;
  padding:0 20px;
}

.card{
  background:#f7f7f7;
  color:#111;
  border-radius:8px;
  padding:35px;
  margin-bottom:30px;
}

.card h1{
  margin-top:0;
  font-size:32px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
}

label{
  font-weight:bold;
  display:block;
  margin-bottom:6px;
}

input, textarea{
  width:100%;
  padding:13px;
  border:1px solid #ccc;
  border-radius:6px;
  font-size:15px;
}

textarea{
  min-height:120px;
  resize:vertical;
}

.readonly{
  background:#eee;
}

.btn{
  background:#111;
  color:#fff;
  border:none;
  padding:13px 22px;
  border-radius:25px;
  cursor:pointer;
  font-weight:bold;
  margin-top:15px;
}

.btn-yellow{
  background:#ffe95c;
  color:#111;
}

.admin{
  display:none;
}

.email-row{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.email-row input{
  flex:1;
}

.delete{
  background:#c62828;
}

.msg{
  margin-top:15px;
  font-weight:bold;
}

@media(max-width:800px){
  .grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<header>
  <div class="logo">UNSECTION <span>| INNOVACIÓN PARTICIPATIVA</span></div>
  <nav>
    <button onclick="toggleAdmin()">Admin</button>
  </nav>
</header>

<div class="container">

  <section class="card">
    <h1>Nueva Idea IP</h1>
    <p>Ingresa tu número de empleado para llenar automáticamente tus datos.</p>

    <div class="grid">
      <div>
        <label>Número de empleado</label>
        <input id="numeroEmpleado" onblur="buscarEmpleado()" placeholder="Ej. 1006">
      </div>

      <div>
        <label>Fecha</label>
        <input id="fecha" class="readonly" readonly>
      </div>

      <div>
        <label>Nombre</label>
        <input id="nombre" class="readonly" readonly>
      </div>

      <div>
        <label>Área</label>
        <input id="area" class="readonly" readonly>
      </div>
    </div>

    <br>

    <label>Observación / Área de oportunidad</label>
    <textarea id="observacion" placeholder="Describe el problema u oportunidad detectada..."></textarea>

    <br><br>

    <label>Idea propuesta / Solución</label>
    <textarea id="idea" placeholder="Describe la solución propuesta..."></textarea>

    <button class="btn btn-yellow" onclick="guardarIdea()">Enviar idea</button>

    <div id="mensaje" class="msg"></div>
  </section>

  <section id="adminPanel" class="card admin">
    <h1>Panel Admin</h1>

    <h3>Correos de notificación</h3>

    <div class="email-row">
      <input id="nuevoCorreo" placeholder="correo@safran-group.com">
      <button class="btn btn-yellow" onclick="agregarCorreo()">Agregar</button>
    </div>

    <div id="listaCorreos"></div>

    <hr>

    <h3>Exportar registro de ideas</h3>
    <button class="btn" onclick="exportarExcel()">Descargar Excel actualizado</button>
  </section>

</div>

<script>
/* ============================
   CONFIGURACIÓN FIREBASE
============================ */

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_PROYECTO.firebaseapp.com",
  projectId: "TU_PROJECT_ID",
  storageBucket: "TU_PROYECTO.appspot.com",
  messagingSenderId: "TU_SENDER_ID",
  appId: "TU_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ============================
   CONFIGURACIÓN EMAILJS
============================ */

emailjs.init("TU_PUBLIC_KEY_EMAILJS");

const SERVICE_ID = "TU_SERVICE_ID";
const TEMPLATE_ID = "TU_TEMPLATE_ID";

/* ============================
   FECHA AUTOMÁTICA
============================ */

document.getElementById("fecha").value = new Date().toLocaleDateString("es-MX");

/* ============================
   BUSCAR EMPLEADO
   Colección: empleados
   Documento: número de empleado
============================ */

async function buscarEmpleado(){
  const numero = document.getElementById("numeroEmpleado").value.trim();

  if(!numero) return;

  const doc = await db.collection("empleados").doc(numero).get();

  if(!doc.exists){
    mostrarMensaje("Empleado no encontrado.", "red");
    document.getElementById("nombre").value = "";
    document.getElementById("area").value = "";
    return;
  }

  const data = doc.data();

  document.getElementById("nombre").value = data.nombre || "";
  document.getElementById("area").value = data.area || "";

  mostrarMensaje("Datos encontrados correctamente.", "green");
}

/* ============================
   GUARDAR IDEA
============================ */

async function guardarIdea(){
  const numeroEmpleado = document.getElementById("numeroEmpleado").value.trim();
  const nombre = document.getElementById("nombre").value.trim();
  const area = document.getElementById("area").value.trim();
  const fecha = document.getElementById("fecha").value;
  const observacion = document.getElementById("observacion").value.trim();
  const idea = document.getElementById("idea").value.trim();

  if(!numeroEmpleado || !nombre || !area || !observacion || !idea){
    mostrarMensaje("Completa todos los campos antes de enviar.", "red");
    return;
  }

  const nuevaIdea = {
    numeroEmpleado,
    nombre,
    area,
    fecha,
    observacion,
    idea,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  };

  await db.collection("ideas_ip").add(nuevaIdea);

  await enviarCorreos(nuevaIdea);

  mostrarMensaje("Idea registrada correctamente.", "green");

  document.getElementById("numeroEmpleado").value = "";
  document.getElementById("nombre").value = "";
  document.getElementById("area").value = "";
  document.getElementById("observacion").value = "";
  document.getElementById("idea").value = "";
}

/* ============================
   ENVIAR CORREOS
============================ */

async function enviarCorreos(ideaData){
  const snapshot = await db.collection("correos_notificacion").get();

  const correos = [];
  snapshot.forEach(doc => correos.push(doc.data().correo));

  for(const correo of correos){
    await emailjs.send(SERVICE_ID, TEMPLATE_ID, {
      to_email: correo,
      numero_empleado: ideaData.numeroEmpleado,
      nombre: ideaData.nombre,
      area: ideaData.area,
      fecha: ideaData.fecha,
      observacion: ideaData.observacion,
      idea: ideaData.idea
    });
  }
}

/* ============================
   ADMIN CORREOS
============================ */

function toggleAdmin(){
  const panel = document.getElementById("adminPanel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
  cargarCorreos();
}

async function agregarCorreo(){
  const correo = document.getElementById("nuevoCorreo").value.trim();

  if(!correo){
    alert("Agrega un correo válido.");
    return;
  }

  await db.collection("correos_notificacion").add({ correo });

  document.getElementById("nuevoCorreo").value = "";
  cargarCorreos();
}

async function cargarCorreos(){
  const lista = document.getElementById("listaCorreos");
  lista.innerHTML = "";

  const snapshot = await db.collection("correos_notificacion").get();

  snapshot.forEach(doc => {
    const data = doc.data();

    const div = document.createElement("div");
    div.className = "email-row";

    div.innerHTML = `
      <input value="${data.correo}" readonly>
      <button class="btn delete" onclick="eliminarCorreo('${doc.id}')">Eliminar</button>
    `;

    lista.appendChild(div);
  });
}

async function eliminarCorreo(id){
  await db.collection("correos_notificacion").doc(id).delete();
  cargarCorreos();
}

/* ============================
   EXPORTAR EXCEL
============================ */

async function exportarExcel(){
  const snapshot = await db.collection("ideas_ip")
    .orderBy("createdAt", "desc")
    .get();

  const data = [];

  snapshot.forEach(doc => {
    const idea = doc.data();

    data.push({
      "Fecha": idea.fecha,
      "Número de empleado": idea.numeroEmpleado,
      "Nombre": idea.nombre,
      "Área": idea.area,
      "Observación / Área de oportunidad": idea.observacion,
      "Idea propuesta / Solución": idea.idea
    });
  });

  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(wb, ws, "Ideas IP");

  XLSX.writeFile(wb, "Registro_Ideas_IP.xlsx");
}

/* ============================
   MENSAJES
============================ */

function mostrarMensaje(texto, color){
  const msg = document.getElementById("mensaje");
  msg.textContent = texto;
  msg.style.color = color;
}
</script>

</body>
</html>-
